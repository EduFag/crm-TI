{% extends "base.html" %}

{% block title %}Cadastrar E-mail{% endblock %}

{% block content %}
<div class="flex flex-col h-full max-w-2xl mx-auto mt-6">
    <div class="flex items-center justify-between mb-4">
        <div>
            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Formulário</h2>
            <p class="text-sm text-slate-500 mt-1">Preencha os dados da nova conta corporativa.</p>
        </div>
    </div>
    
    <div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm">
        <form method="POST">
            {% csrf_token %}
            
            <div class="space-y-5">
                {{ form.as_p }}
            </div>
            
            <div class="mt-8 flex gap-3 pt-6 border-t border-slate-100">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-sm">Salvar Dados</button>
                <a href="javascript:history.back()" class="bg-slate-100 text-slate-700 px-6 py-2.5 rounded-lg font-bold hover:bg-slate-200 transition-colors">Voltar / Cancelar</a>
            </div>
        </form>
    </div>
</div>

<style>
    form p { display: flex; flex-direction: column; gap: 0.35rem; }
    form label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.025em; }
    form input, form select, form textarea { 
        font-size: 0.875rem; 
        padding: 0.6rem 0.75rem; 
        border: 1px solid #cbd5e1; 
        border-radius: 0.5rem; 
        outline: none; 
        transition: all 0.2s;
        background-color: #fff;
    }
    form input:focus, form select:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
    form input[type="checkbox"] { width: 1.2rem; height: 1.2rem; margin-top: 0.25rem; accent-color: #3b82f6; }
    form .helptext { font-size: 0.7rem; color: #94a3b8; font-weight: 500; }
    form .errorlist { color: #ef4444; font-size: 0.75rem; font-weight: 600; background: #fef2f2; padding: 0.5rem; border-radius: 0.25rem; }
</style>
{% endblock %}
