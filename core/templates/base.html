<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema TI{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Configuração do Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    {% include "core/_sidebar_styles.html" %}
    <script>
        try {
            if (localStorage.getItem('sidebar-collapsed') === '1') {
                document.documentElement.classList.add('sidebar-collapsed');
            }
        } catch (e) { }
    </script>
</head>

<body class="bg-slate-50 font-sans text-slate-800 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="app-sidebar"
        class="relative shrink-0 bg-white border-r border-slate-200 flex flex-col z-30">
        <!-- Logo -->
        <div class="h-16 flex items-center px-6 border-b border-slate-100 sidebar-logo-wrap">
            <div class="flex items-center gap-3 min-w-0">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                </div>
                <span class="sidebar-hide-collapsed font-bold text-lg text-slate-900 tracking-tight">Sistema TI</span>
            </div>
        </div>

        {% include "core/_sidebar.html" %}

        <!-- Área do Usuário -->
        <div class="p-4 border-t border-slate-200 bg-white">
            <div class="flex items-center gap-3 mb-3 sidebar-user-wrap">
                <div
                    class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 font-bold border border-blue-100 shrink-0"
                    title="{{ user.get_full_name|default:user.username }}">
                    {{ user.username|make_list|first|upper }}
                </div>
                <div class="flex-1 min-w-0 sidebar-hide-collapsed">
                    <p class="text-sm font-semibold text-slate-900 truncate">{{ user.get_full_name|default:user.username }}</p>
                    <p class="text-xs text-slate-500 truncate">{{ user.get_role_display|default:"Usuário" }}</p>
                </div>
            </div>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" title="Sair do Sistema"
                    class="w-full flex items-center justify-center gap-2 px-3 py-2 text-sm text-red-600 font-medium bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                        </path>
                    </svg>
                    <span class="sidebar-hide-collapsed">Sair do Sistema</span>
                </button>
            </form>
        </div>

        <!-- Botão recolher/expandir -->
        <button type="button" id="sidebar-toggle" title="Recolher menu"
            class="absolute -right-3 top-[4.5rem] z-40 flex h-6 w-6 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-500 shadow-md hover:border-blue-300 hover:bg-blue-50 hover:text-blue-600 transition-all focus:outline-none focus:ring-2 focus:ring-blue-200">
            <svg id="sidebar-toggle-icon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
            </svg>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">

        <!-- Header -->
        <header class="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-8">
            <div class="flex-1 max-w-xl">
                <!-- Busca (Placeholder) -->
                <div class="relative group">
                    <svg class="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 group-focus-within:text-blue-500 transition-colors"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <input type="text" placeholder="Pesquisar..."
                        class="w-full pl-10 pr-4 py-2 border-none bg-slate-50 hover:bg-slate-100 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-100 rounded-lg text-sm transition-all">
                </div>
            </div>

            <div class="flex items-center gap-5 ml-4 text-slate-400">
                <button class="hover:text-slate-600 transition-colors relative">
                    <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                        </path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Dynamic Page Content -->
        <div class="flex-1 overflow-auto p-8 bg-slate-50/50">
            {% block content %}
            {% endblock %}
        </div>

    </main>

    <!-- Container global de modais HTMX -->
    <div id="modal-container"></div>

    <script>
        // Deve rodar após o <body> existir (script no <head> quebrava em páginas como history)
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });
        document.body.addEventListener('closeModal', function () {
            var modal = document.getElementById('modal-container');
            if (modal) modal.innerHTML = '';
        });
        document.body.addEventListener('closeCreateModal', function () {
            var modal = document.getElementById('modal-container');
            if (modal) modal.innerHTML = '';
        });

        // Menu lateral recolhível
        (function () {
            var sidebar = document.getElementById('app-sidebar');
            var toggle = document.getElementById('sidebar-toggle');
            var root = document.documentElement;
            if (!sidebar || !toggle) return;

            var storageKey = 'sidebar-collapsed';

            function menuRecolhido() {
                return root.classList.contains('sidebar-collapsed');
            }

            function aplicarEstado(recolhido) {
                root.classList.toggle('sidebar-collapsed', recolhido);
                toggle.title = recolhido ? 'Expandir menu' : 'Recolher menu';
                if (recolhido) {
                    sidebar.querySelectorAll('.sidebar-group[open]').forEach(function (grupo) {
                        grupo.removeAttribute('open');
                    });
                }
            }

            function fecharOutrosGrupos(grupoAtivo) {
                sidebar.querySelectorAll('.sidebar-group[open]').forEach(function (outro) {
                    if (outro !== grupoAtivo) {
                        outro.removeAttribute('open');
                    }
                });
            }

            toggle.addEventListener('click', function () {
                var recolhido = !menuRecolhido();
                aplicarEstado(recolhido);
                try {
                    localStorage.setItem(storageKey, recolhido ? '1' : '0');
                } catch (e) { }
            });

            sidebar.querySelectorAll('.sidebar-group-trigger').forEach(function (trigger) {
                trigger.addEventListener('click', function (event) {
                    if (!menuRecolhido()) return;

                    event.preventDefault();
                    var grupo = trigger.closest('.sidebar-group');
                    if (!grupo) return;

                    aplicarEstado(false);
                    try {
                        localStorage.setItem(storageKey, '0');
                    } catch (e) { }

                    fecharOutrosGrupos(grupo);
                    grupo.setAttribute('open', '');
                });
            });

            // Accordion: só uma categoria aberta por vez
            sidebar.querySelectorAll('.sidebar-group').forEach(function (grupo) {
                grupo.addEventListener('toggle', function () {
                    if (!grupo.open || menuRecolhido()) return;
                    fecharOutrosGrupos(grupo);
                    grupo.setAttribute('open', '');
                });
            });
        })();
    </script>
</body>

</html>
