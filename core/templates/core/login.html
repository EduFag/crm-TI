{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema TI</title>
    <link rel="stylesheet" href="{% static 'core/css/tailwind.css' %}">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Acesso ao Sistema</h2>
        
        <form method="post" action="">
            {% csrf_token %}
            {# Preserva redirecionamento pós-login (?next=) enviado pelo @login_required #}
            <input type="hidden" name="next" value="{{ next }}">

            {% if form.errors %}
                <p class="text-red-500 text-sm mb-4 text-center">Usuário ou senha inválidos.</p>
            {% endif %}

            <div class="mb-4">
                <label for="username" class="block text-gray-700 text-sm font-bold mb-2">Usuário</label>
                <input type="text" name="username" id="username"
                       value="{{ form.username.value|default_if_none:'' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required autofocus autocomplete="username">
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                <input type="password" name="password" id="password"
                       class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required autocomplete="current-password">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-200">
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
