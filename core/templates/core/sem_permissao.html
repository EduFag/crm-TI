{% extends "base.html" %}

{% block title %}Sem Permissão{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-12 text-center flex flex-col items-center justify-center min-h-[400px]">
    <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-6">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path>
        </svg>
    </div>
    <h3 class="text-2xl font-semibold text-slate-800 mb-3">Acesso negado</h3>
    <p class="text-slate-500 max-w-lg text-lg mb-6">
        Você não tem permissão para acessar este módulo. Entre em contato com um administrador se precisar de acesso.
    </p>
    <a href="{% url 'dashboard' %}" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-bold text-sm transition-colors">
        Voltar ao início
    </a>
</div>
{% endblock %}
