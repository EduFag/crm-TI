<details class="mb-1 sidebar-group" {% if expanded %}open{% endif %}>
    <summary
        class="flex items-center justify-between gap-2 px-3 py-2.5 text-slate-700 hover:bg-slate-100 rounded-lg cursor-pointer select-none transition-colors">
        <span class="flex items-center gap-3 font-medium text-sm">
            {{ icon|safe }}
            {{ title }}
        </span>
        <svg class="chevron w-4 h-4 text-slate-400 shrink-0 transition-transform duration-200" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
    </summary>
    <div class="mt-1 ml-3 pl-3 border-l border-slate-200 space-y-0.5 pb-1">
        {% include items_template %}
    </div>
</details>
