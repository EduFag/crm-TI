<a href="{{ url }}"
    class="flex items-center gap-2.5 px-3 py-2 text-sm rounded-lg transition-colors
    {% if active %}bg-blue-50 text-blue-700 font-medium{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-900{% endif %}">
    <span class="w-1.5 h-1.5 rounded-full shrink-0 {% if active %}bg-blue-600{% else %}bg-slate-300{% endif %}"></span>
    <span class="truncate">{{ label }}</span>
</a>
