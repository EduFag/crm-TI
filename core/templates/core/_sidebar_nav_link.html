<a href="{{ url }}"
    class="sidebar-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all
    {% if active %}sidebar-nav-link-active text-blue-700 font-semibold{% else %}text-slate-600 hover:bg-slate-50 hover:text-slate-900{% endif %}">
    {% if icon %}
        <div class="sidebar-nav-icon flex items-center justify-center shrink-0 {% if active %}text-blue-600{% else %}text-slate-400{% endif %}">
            {{ icon|safe }}
        </div>
    {% else %}
        <span class="sidebar-nav-dot w-1.5 h-1.5 rounded-full shrink-0 {% if active %}bg-blue-600{% else %}bg-slate-300{% endif %}"></span>
    {% endif %}
    <span class="sidebar-link-label truncate">{{ label }}</span>
</a>
