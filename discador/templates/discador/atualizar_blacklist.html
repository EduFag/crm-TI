{% extends "discador/base_discador.html" %}

{% block discador_content %}
<div class="w-full">
    <h1 class="text-2xl font-bold mb-6">Atualizar Blacklist pela API</h1>
    
    {% if messages %}
        {% for message in messages %}
            <div class="bg-green-100 text-green-800 p-3 rounded mb-4">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="bg-white p-6 shadow rounded-lg">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="pt-4">
                <button type="submit" class="w-full bg-indigo-600 text-white px-6 py-3 rounded shadow hover:bg-indigo-700 font-bold">Buscar e Atualizar Blacklist</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
