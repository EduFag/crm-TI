{% extends "base.html" %}

{% block content %}
<div class="mb-8">
    <div class="flex items-center justify-between bg-white px-6 py-4 rounded-xl shadow-sm border border-slate-100">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                </svg>
                Discador 3C Plus
            </h1>
            
            <nav class="hidden md:flex items-center gap-1">
                <a href="{% url 'discador:dashboard' %}" class="px-4 py-2 text-sm font-medium rounded-lg {% if request.resolver_match.url_name == 'dashboard' %}bg-blue-50 text-blue-700{% else %}text-slate-600 hover:bg-slate-50 hover:text-slate-900{% endif %} transition-colors">Dashboard</a>
                
                <a href="{% url 'discador:reciclar_bases' %}" class="px-4 py-2 text-sm font-medium rounded-lg {% if request.resolver_match.url_name == 'reciclar_bases' or request.resolver_match.url_name == 'recycling_panel' %}bg-blue-50 text-blue-700{% else %}text-slate-600 hover:bg-slate-50 hover:text-slate-900{% endif %} transition-colors">Reciclar Bases</a>
                
                <a href="{% url 'discador:blacklist_ativa' %}" class="px-4 py-2 text-sm font-medium rounded-lg {% if request.resolver_match.url_name == 'blacklist_ativa' %}bg-blue-50 text-blue-700{% else %}text-slate-600 hover:bg-slate-50 hover:text-slate-900{% endif %} transition-colors">Blacklist</a>
                
                <a href="{% url 'discador:regras_reciclagem' %}" class="px-4 py-2 text-sm font-medium rounded-lg {% if request.resolver_match.url_name == 'regras_reciclagem' %}bg-blue-50 text-blue-700{% else %}text-slate-600 hover:bg-slate-50 hover:text-slate-900{% endif %} transition-colors">Regras</a>
                
                <div class="h-5 w-px bg-slate-200 mx-2"></div>
                
                <a href="{% url 'discador:configuracoes_api' %}" class="px-4 py-2 text-sm font-medium rounded-lg {% if request.resolver_match.url_name == 'configuracoes_api' %}bg-blue-50 text-blue-700{% else %}text-slate-600 hover:bg-slate-50 hover:text-slate-900{% endif %} transition-colors">Configurações</a>
            </nav>
        </div>
    </div>
</div>

{% block discador_content %}
{% endblock %}
{% endblock %}
