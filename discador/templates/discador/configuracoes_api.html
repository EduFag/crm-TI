{% extends "discador/base_discador.html" %}

{% block discador_content %}
<div class="w-full">
    <h1 class="text-2xl font-bold mb-6">Configurações da API 3C Plus</h1>
    
    {% if messages %}
        {% for message in messages %}
            <div class="bg-green-100 text-green-800 p-3 rounded mb-4">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="bg-white p-6 shadow rounded-lg">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="pt-4 flex justify-between">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700">Salvar Configurações</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
