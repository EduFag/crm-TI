{% extends "discador/base_discador.html" %}

{% block discador_content %}
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
    <div class="bg-white p-6 shadow-sm rounded-xl border border-slate-100 relative overflow-hidden group">
        <div class="absolute right-0 top-0 h-full w-2 bg-blue-500 rounded-r-xl group-hover:w-3 transition-all"></div>
        <div class="flex justify-between items-start">
            <div>
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Telefones na Blacklist</h2>
                <p class="text-4xl font-black text-slate-800">{{ total_blacklist }}</p>
            </div>
            <div class="p-2 bg-blue-50 rounded-lg text-blue-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
        </div>
    </div>
    
    <div class="bg-white p-6 shadow-sm rounded-xl border border-slate-100 relative overflow-hidden group">
        <div class="absolute right-0 top-0 h-full w-2 bg-green-500 rounded-r-xl group-hover:w-3 transition-all"></div>
        <div class="flex justify-between items-start">
            <div>
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Bases Processadas</h2>
                <p class="text-4xl font-black text-slate-800">{{ total_bases }}</p>
            </div>
            <div class="p-2 bg-green-50 rounded-lg text-green-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
        </div>
    </div>
</div>

<div class="bg-white p-6 shadow-sm rounded-xl border border-slate-100">
    <h2 class="text-lg font-bold text-slate-800 mb-4">Ações Rápidas</h2>
    <div class="flex gap-4">
        <a href="{% url 'discador:reciclar_bases' %}" class="flex items-center gap-2 bg-blue-600 text-white px-5 py-2.5 rounded-lg shadow-sm hover:bg-blue-700 hover:shadow transition-all font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2M7 9a7 7 0 0110 0"></path>
            </svg>
            Reciclar Base CSV
        </a>
        <a href="{% url 'discador:atualizar_blacklist' %}" class="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-lg shadow-sm hover:bg-indigo-700 hover:shadow transition-all font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
            </svg>
            Atualizar da API
        </a>
    </div>
</div>
{% endblock %}
