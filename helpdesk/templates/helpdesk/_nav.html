<div class="flex items-center gap-6 border-b border-slate-200 mb-6">
    {% if pode_acessar_dashboard_helpdesk %}
    <a href="{% url 'helpdesk:dashboard' %}" class="pb-3 text-sm font-semibold transition-colors {% if request.resolver_match.url_name == 'dashboard' %}text-blue-600 border-b-2 border-blue-600{% else %}text-slate-500 hover:text-slate-800{% endif %}">
        Dashboard Geral
    </a>
    {% endif %}
    <a href="{% url 'helpdesk:kanban' %}" class="pb-3 text-sm font-semibold transition-colors {% if request.resolver_match.url_name == 'kanban' %}text-blue-600 border-b-2 border-blue-600{% else %}text-slate-500 hover:text-slate-800{% endif %}">
        Quadro Kanban
    </a>
    {% if pode_acessar_dashboard_helpdesk %}
    <a href="{% url 'helpdesk:history' %}" class="pb-3 text-sm font-semibold transition-colors {% if request.resolver_match.url_name == 'history' %}text-blue-600 border-b-2 border-blue-600{% else %}text-slate-500 hover:text-slate-800{% endif %}">
        Histórico
    </a>
    {% endif %}
    <button type="button"
            id="helpdesk-push-toggle"
            class="hidden ml-auto pb-3 flex items-center gap-2.5 cursor-pointer select-none"
            title="Ligar alertas de chamados no navegador">
        <span id="helpdesk-push-nav-label" class="text-sm font-medium text-slate-600">Notificações</span>
        <span id="helpdesk-push-toggle-track"
              class="relative inline-flex h-6 w-11 shrink-0 items-center rounded-full bg-slate-300 transition-colors"
              aria-hidden="true">
            <span id="helpdesk-push-toggle-knob"
                  class="inline-block h-4 w-4 translate-x-1 rounded-full bg-white shadow transition-transform"></span>
        </span>
    </button>
</div>
{% include "helpdesk/_push_banner.html" %}
