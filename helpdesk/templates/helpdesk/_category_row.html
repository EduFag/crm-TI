<tr id="cat-{{ type }}-{{ category.id }}" class="hover:bg-slate-50 transition-colors {% if not category.is_active %}opacity-60 bg-slate-50/50{% endif %}">
    <td class="px-5 py-3">
        <p class="font-medium {% if category.is_active %}text-slate-900{% else %}text-slate-500 line-through{% endif %} truncate max-w-xs">{{ category.name }}</p>
    </td>
    <td class="px-5 py-3 text-center">
        {% if category.is_active %}
            <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-green-100 text-green-700 uppercase tracking-tight">Ativo</span>
        {% else %}
            <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-slate-100 text-slate-600 uppercase tracking-tight">Inativo</span>
        {% endif %}
    </td>
    <td class="px-5 py-3 text-center">
        <div class="flex items-center justify-center gap-1">
            <button title="{% if category.is_active %}Desativar{% else %}Ativar{% endif %}"
                    hx-post="{% url 'helpdesk:category_toggle_active' type category.id %}" 
                    hx-target="#cat-{{ type }}-{{ category.id }}" 
                    hx-swap="outerHTML" 
                    class="inline-flex p-1.5 rounded-lg transition-colors {% if category.is_active %}text-amber-500 hover:bg-amber-50 hover:text-amber-600{% else %}text-green-500 hover:bg-green-50 hover:text-green-600{% endif %}">
                {% if category.is_active %}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path>
                </svg>
                {% else %}
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                {% endif %}
            </button>
            {% if not category.is_active %}
            <button title="Excluir Permanentemente"
                    hx-post="{% url 'helpdesk:category_delete' type category.id %}" 
                    hx-target="#cat-{{ type }}-{{ category.id }}" 
                    hx-swap="outerHTML" 
                    hx-confirm="ATENÇÃO: Ação irreversível!&#10;&#10;Deseja remover permanentemente esta categoria e TODOS os registros a ela associados?"
                    class="inline-flex p-1.5 rounded-lg transition-colors text-red-500 hover:bg-red-50 hover:text-red-600">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>
            </button>
            {% endif %}
        </div>
    </td>
</tr>
