<tr id="cat-{{ type }}-{{ category.id }}" class="hover:bg-slate-50 transition-colors {% if not category.is_active %}opacity-60 bg-slate-50/50{% endif %}">
    <td class="px-5 py-3">
        <p class="font-medium {% if category.is_active %}text-slate-900{% else %}text-slate-500 line-through{% endif %} truncate max-w-xs">{{ category.name }}</p>
    </td>
    <td class="px-5 py-3 text-center">
        {% if category.is_active %}
            <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-green-100 text-green-700 uppercase tracking-tight">Ativo</span>
        {% else %}
            <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-slate-100 text-slate-600 uppercase tracking-tight">Inativo</span>
        {% endif %}
    </td>
    <td class="px-5 py-3 text-center">
        <button title="{% if category.is_active %}Desativar{% else %}Ativar{% endif %}"
                hx-post="{% url 'helpdesk:category_toggle_active' type category.id %}" 
                hx-target="#cat-{{ type }}-{{ category.id }}" 
                hx-swap="outerHTML" 
                class="inline-flex p-1.5 rounded-lg transition-colors {% if category.is_active %}text-red-500 hover:bg-red-50 hover:text-red-600{% else %}text-green-500 hover:bg-green-50 hover:text-green-600{% endif %}">
            {% if category.is_active %}
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path>
            </svg>
            {% else %}
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            {% endif %}
        </button>
    </td>
</tr>
