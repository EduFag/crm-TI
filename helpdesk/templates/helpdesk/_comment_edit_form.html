<form method="post"
      action="{% url 'helpdesk:comment_edit' ticket.id comment.id %}"
      hx-post="{% url 'helpdesk:comment_edit' ticket.id comment.id %}"
      hx-target="#comments-list"
      hx-swap="innerHTML"
      class="w-full bg-amber-50 border border-amber-200 rounded-lg p-3 space-y-2"
      id="comment-{{ comment.id }}">
    {% csrf_token %}
    <p class="text-[11px] font-semibold text-amber-800 uppercase tracking-wide">Editar mensagem #{{ comment.id }}</p>
    <textarea name="text" rows="4" required
              class="w-full text-sm p-2.5 border border-amber-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white resize-y">{{ comment.text }}</textarea>
    <div class="flex items-center gap-2 justify-end">
        <button type="button"
                hx-get="{% url 'helpdesk:ticket_comments' ticket.id %}"
                hx-target="#comments-list"
                hx-swap="innerHTML"
                class="text-xs font-medium text-slate-600 hover:text-slate-800 px-3 py-1.5 rounded-lg border border-slate-200 bg-white">
            Cancelar
        </button>
        <button type="submit"
                class="text-xs font-semibold text-white bg-amber-600 hover:bg-amber-700 px-3 py-1.5 rounded-lg">
            Salvar
        </button>
    </div>
</form>
