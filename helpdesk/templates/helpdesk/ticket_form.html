{% extends "base.html" %}

{% block title %}Novo Chamado - Helpdesk{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-8">
    
    <div class="mb-8">
        <a href="{% url 'helpdesk:kanban' %}" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-slate-800 mb-2 transition-colors">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Voltar ao Kanban
        </a>
        <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Novo Chamado</h2>
        <p class="text-slate-500 mt-1">Descreva o problema para abrir um novo chamado.</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <!-- Linha 1 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="id_requester_name" class="block text-sm font-semibold text-slate-700 mb-1">Nome do Solicitante <span class="text-red-500">*</span></label>
                    <input type="text" name="requester_name" id="id_requester_name" required value="{{ nome_solicitante_padrao }}" placeholder="Seu nome" class="w-full text-sm p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors">
                </div>
                <div>
                    <label for="id_category" class="block text-sm font-semibold text-slate-700 mb-1">Categoria <span class="text-red-500">*</span></label>
                    <select name="category" id="id_category" required class="w-full text-sm p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 focus:bg-white transition-colors">
                        <option value="HARDWARE">Hardware</option>
                        <option value="SOFTWARE">Software</option>
                        <option value="NETWORK">Rede</option>
                        <option value="OTHER" selected>Outros</option>
                    </select>
                </div>
            </div>

            <!-- Linha 2 -->
            <div>
                <label for="id_title" class="block text-sm font-semibold text-slate-700 mb-1">Título do Problema <span class="text-red-500">*</span></label>
                <input type="text" name="title" id="id_title" required placeholder="Resumo curto da solicitação" class="w-full text-sm p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 focus:bg-white transition-colors">
            </div>

            <!-- Linha 3 -->
            <div>
                <label for="id_description" class="block text-sm font-semibold text-slate-700 mb-1">Descrição Detalhada</label>
                <textarea name="description" id="id_description" rows="4" placeholder="Descreva o cenário, erros apresentados, prints..." class="w-full text-sm p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 focus:bg-white transition-colors resize-y"></textarea>
            </div>

            <!-- Linha 4 -->
            <div>
                <label for="id_priority" class="block text-sm font-semibold text-slate-700 mb-1">Prioridade Inicial <span class="text-red-500">*</span></label>
                <select name="priority" id="id_priority" required class="w-full text-sm p-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 focus:bg-white transition-colors">
                    <option value="LOW">Baixa</option>
                    <option value="MEDIUM" selected>Média</option>
                    <option value="HIGH">Alta</option>
                    <option value="URGENT">Urgente</option>
                </select>
            </div>

            <div class="pt-4 border-t border-slate-100 flex justify-end gap-3">
                <a href="{% url 'helpdesk:kanban' %}" class="px-5 py-2.5 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">Cancelar</a>
                <button type="submit" class="px-5 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm">Criar Chamado</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
