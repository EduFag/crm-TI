<table class="w-full text-left text-sm whitespace-nowrap">
    <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
            <th class="px-5 py-3 font-semibold text-slate-600 uppercase text-xs">Nome</th>
            <th class="px-5 py-3 font-semibold text-slate-600 uppercase text-xs w-24 text-center">Status</th>
            <th class="px-5 py-3 font-semibold text-slate-600 uppercase text-xs w-24 text-center">Ação</th>
        </tr>
    </thead>
    <tbody class="divide-y divide-slate-100">
        {% for category in categories %}
            {% include "helpdesk/_category_row.html" %}
        {% empty %}
            <tr>
                <td colspan="3" class="px-5 py-8 text-center text-slate-400">Nenhuma categoria encontrada.</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
