{% load static %}
{# Banner — pede permissão (default) ou orienta a reativar no Chrome (denied) #}
<div id="helpdesk-push-banner"
     class="hidden mb-4 flex flex-col gap-3 px-4 py-3 rounded-xl text-sm border">
    <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-3">
        <div class="flex items-start gap-3">
            <svg id="helpdesk-push-icon" class="w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
            </svg>
            <div>
                <p id="helpdesk-push-texto" class="font-medium"></p>
                <p id="helpdesk-push-ajuda" class="hidden mt-2 text-xs leading-relaxed opacity-90"></p>
            </div>
        </div>
        <div id="helpdesk-push-acoes" class="flex items-center gap-2 shrink-0"></div>
    </div>
</div>

<meta name="helpdesk-push-base" content="{% url 'helpdesk:kanban' %}">
<meta name="csrf-token" content="{{ csrf_token }}">
<script src="{% static 'helpdesk/push.js' %}?v=4" defer></script>
