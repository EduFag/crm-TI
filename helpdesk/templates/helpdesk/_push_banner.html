{% load static %}
{# Banner para pedir permissão de notificações Web Push #}
<div id="helpdesk-push-banner"
     class="hidden mb-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3 px-4 py-3 bg-blue-50 border border-blue-200 rounded-xl text-sm text-blue-900">
    <div class="flex items-start sm:items-center gap-3">
        <svg class="w-5 h-5 text-blue-600 shrink-0 mt-0.5 sm:mt-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
        </svg>
        <p>Receba alertas de chamados mesmo com o navegador fechado — comentários, movimentações e alterações de prioridade.</p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
        <button type="button"
                onclick="helpdeskPush.ativar()"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
            Ativar
        </button>
        <button type="button"
                onclick="helpdeskPush.dispensar()"
                class="px-4 py-2 text-blue-700 hover:bg-blue-100 rounded-lg text-sm font-medium transition-colors">
            Agora não
        </button>
    </div>
</div>

<meta name="helpdesk-push-base" content="{% url 'helpdesk:kanban' %}">
<script src="{% static 'helpdesk/push.js' %}" defer></script>
