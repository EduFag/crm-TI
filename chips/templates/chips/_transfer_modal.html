<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40"
     onclick="document.getElementById('modal-container').innerHTML = ''"></div>
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 pointer-events-none">
    <div class="bg-white rounded-xl shadow-2xl border border-slate-200 w-full max-w-lg pointer-events-auto"
         onclick="event.stopPropagation()">
        <div class="px-6 py-5 border-b border-slate-100 bg-slate-50 rounded-t-xl">
            <h3 class="text-lg font-bold text-slate-900">Transferir chip {{ chip.line_number }}</h3>
            <p class="text-xs text-slate-500 mt-0.5">A posse muda; o ciclo de recarga permanece o mesmo.</p>
        </div>
        <form id="transfer-form" class="p-6 space-y-4">
            {% csrf_token %}
            <div class="flex gap-4 text-sm" id="tipo-titular-radios">
                {% for radio in form.tipo_titular %}
                <label class="flex items-center gap-2 cursor-pointer">
                    {{ radio.tag }}
                    <span>{{ radio.choice_label }}</span>
                </label>
                {% endfor %}
            </div>
            <div id="campo-titular-texto">
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Nome do titular</label>
                {{ form.employee_name }}
            </div>
            <div id="campo-titular-usuario" class="hidden">
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Usuário do sistema</label>
                {{ form.employee_user }}
            </div>
            <div class="flex gap-2 pt-2">
                <button type="button" onclick="document.getElementById('modal-container').innerHTML = ''"
                        class="flex-1 py-2.5 border border-slate-300 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50">
                    Cancelar
                </button>
                <button type="submit"
                        class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold">
                    Confirmar transferência
                </button>
            </div>
        </form>
    </div>
</div>
<script>
(function() {
    var chipId = {{ chip.id }};
    var tipoUsuario = document.querySelector('input[name="tipo_titular"][value="usuario"]');
    var campoTexto = document.getElementById('campo-titular-texto');
    var campoUsuario = document.getElementById('campo-titular-usuario');

    function toggleTitular() {
        var usarUsuario = tipoUsuario && tipoUsuario.checked;
        if (campoTexto) campoTexto.classList.toggle('hidden', usarUsuario);
        if (campoUsuario) campoUsuario.classList.toggle('hidden', !usarUsuario);
    }
    document.querySelectorAll('input[name="tipo_titular"]').forEach(function(r) {
        r.addEventListener('change', toggleTitular);
    });
    toggleTitular();

    document.getElementById('transfer-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var fd = new FormData(this);
        fetch('/chips/api/grid/' + chipId + '/transfer/', {
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token }}' },
            body: fd,
        })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(res) {
            if (!res.ok) {
                alert(res.data.error || 'Erro ao transferir.');
                return;
            }
            document.getElementById('modal-container').innerHTML = '';
            if (window.chipsGrid) window.chipsGrid.replaceData();
        });
    });
})();
</script>
