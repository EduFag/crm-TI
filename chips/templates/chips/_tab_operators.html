<div class="chips-tab-panel hidden" data-tab-panel="operators">
    <div class="flex items-center justify-between mb-4">
        <p class="text-sm text-slate-500">Operadoras de telefonia cadastradas.</p>
        <button type="button"
                hx-get="{% url 'chips:operator_create' %}"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-bold shadow-sm transition-colors text-sm">+ Nova Operadora</button>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-left text-sm">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                    <th class="px-6 py-4 font-semibold text-slate-500 uppercase text-xs">ID</th>
                    <th class="px-6 py-4 font-semibold text-slate-500 uppercase text-xs">Nome</th>
                    <th class="px-6 py-4 font-semibold text-slate-500 uppercase text-xs">Status</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                {% for op in operators %}
                <tr class="hover:bg-slate-50">
                    <td class="px-6 py-4 font-mono text-slate-500">#{{ op.id }}</td>
                    <td class="px-6 py-4 font-bold text-slate-900">{{ op.name }}</td>
                    <td class="px-6 py-4">
                        <span class="px-2.5 py-1 rounded text-xs font-bold {% if op.status == 'ACTIVE' %}bg-emerald-100 text-emerald-700{% else %}bg-red-100 text-red-700{% endif %}">{{ op.get_status_display }}</span>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="p-6 text-center text-slate-400">Nenhuma operadora cadastrada.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
