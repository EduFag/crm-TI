<link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator_modern.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>

<div class="bg-white rounded-xl shadow-sm border border-slate-200 mb-8">
    <div class="p-4 border-b border-slate-100 flex flex-wrap items-center justify-between gap-3 bg-slate-50 rounded-t-xl">
        <div>
            <h4 class="font-bold text-slate-800">Planilha Callcenter</h4>
            <p class="text-xs text-slate-500">Edite inline, cole do Excel ou adicione linhas. Ciclo de recarga: 90 dias.</p>
        </div>
        <div class="flex gap-2">
            <button type="button" id="btn-add-chip-row"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">
                + Nova linha
            </button>
        </div>
    </div>
    <div id="callcenter-grid" class="p-2"></div>
</div>

<script>
(function() {
    var csrfToken = '{{ csrf_token }}';
    var operators = [];
    var envelopes = [];

    function patchChip(id, payload) {
        return fetch('/chips/api/grid/' + id + '/', {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify(payload),
        }).then(function(r) {
            return r.json().then(function(d) {
                if (!r.ok) throw new Error(d.error || 'Erro ao salvar.');
                return d.data;
            });
        });
    }

    function formatRecharge(cell) {
        var d = cell.getRow().getData();
        var cls = 'text-slate-600';
        if (d.recharge_status === 'warning') cls = 'text-amber-600 font-bold';
        if (d.recharge_status === 'overdue') cls = 'text-red-600 font-bold';
        var txt = d.recharge_due_at ? d.recharge_due_at.split('-').reverse().join('/') : '—';
        if (d.days_to_recharge !== null && d.days_to_recharge !== undefined) {
            txt += ' (' + d.days_to_recharge + 'd)';
        }
        return '<span class="' + cls + '">' + txt + '</span>';
    }

    function formatActions(cell) {
        var d = cell.getRow().getData();
        var html = '';
        if (d.custody === 'WITH_PERSON') {
            html += '<button type="button" class="text-blue-600 text-xs font-bold mr-2 btn-transfer" data-id="' + d.id + '">Transferir</button>';
            html += '<button type="button" class="text-orange-600 text-xs font-bold mr-2 btn-return" data-id="' + d.id + '">Devolver TI</button>';
        }
        html += '<button type="button" class="text-emerald-600 text-xs font-bold btn-recharge" data-id="' + d.id + '">Recarregar</button>';
        return html;
    }

    var table = new Tabulator('#callcenter-grid', {
        ajaxURL: '{% url "chips:grid_data" %}',
        ajaxResponse: function(url, params, response) {
            operators = response.operators || [];
            envelopes = response.envelopes || [];
            return response.data;
        },
        layout: 'fitDataFill',
        height: '480px',
        placeholder: 'Nenhum chip cadastrado. Clique em "+ Nova linha".',
        clipboard: true,
        clipboardPasteAction: 'update',
        columns: [
            { title: 'Linha', field: 'line_number', editor: 'input', width: 130 },
            { title: 'Titular', field: 'employee_name', editor: 'input', width: 160,
              editable: function(cell) { return cell.getData().custody === 'WITH_PERSON'; } },
            { title: 'Ativação', field: 'activated_at', editor: 'input', width: 110 },
            { title: 'Entrega', field: 'last_delivery_at', width: 100, headerSort: false },
            { title: 'Últ. recarga', field: 'last_recharge_at', width: 100, headerSort: false },
            { title: 'Últ. bloqueio', field: 'last_blocked_at', width: 110, headerSort: false },
            { title: 'Operadora', field: 'operator_id', width: 110,
              editor: 'select',
              editorParams: function() {
                  return { values: Object.fromEntries(operators.map(function(o) { return [o.id, o.name]; })) };
              },
              formatter: function(cell) { return cell.getData().operator_name; } },
            { title: 'Custódia', field: 'custody', width: 110,
              editor: 'select',
              editorParams: { values: { 'WITH_TI': 'Na TI', 'WITH_PERSON': 'Com pessoa' } },
              formatter: function(cell) { return cell.getData().custody_display; } },
            { title: 'Envelope', field: 'batch_id', width: 150,
              editor: 'select',
              editorParams: function() {
                  var vals = { '': '—' };
                  envelopes.forEach(function(e) { vals[e.id] = e.label; });
                  return { values: vals };
              },
              editable: function(cell) { return cell.getData().custody === 'WITH_TI'; },
              formatter: function(cell) { return cell.getData().envelope_label || '—'; } },
            { title: 'Vence recarga', field: 'recharge_due_at', width: 130, formatter: formatRecharge, headerSort: false },
            { title: 'Ações', field: 'actions', width: 200, formatter: formatActions, headerSort: false },
        ],
        cellEdited: function(cell) {
            var row = cell.getRow();
            var d = row.getData();
            if (!d.id) return;
            var field = cell.getField();
            var payload = {};
            payload[field] = cell.getValue();
            if (field === 'operator_id') payload.operator_id = parseInt(cell.getValue(), 10);
            if (field === 'batch_id') payload.batch_id = cell.getValue() ? parseInt(cell.getValue(), 10) : null;
            if (field === 'custody' && cell.getValue() === 'WITH_PERSON') {
                var nome = prompt('Nome do titular:');
                if (!nome) { row.update(d); return; }
                payload.employee_name = nome;
            }
            if (field === 'custody' && cell.getValue() === 'WITH_TI' && !d.batch_id && envelopes.length) {
                payload.batch_id = envelopes[0].id;
            }
            patchChip(d.id, payload)
                .then(function(updated) { row.update(updated); })
                .catch(function(err) {
                    alert(err.message);
                    row.update(d);
                });
        },
    });

    window.chipsGrid = table;

    document.getElementById('btn-add-chip-row').addEventListener('click', function() {
        var line = prompt('Número da linha (com DDD):');
        if (!line) return;
        if (!operators.length) {
            alert('Cadastre uma operadora antes.');
            return;
        }
        var opId = operators[0].id;
        if (operators.length > 1) {
            var nomes = operators.map(function(o, i) { return (i+1) + '=' + o.name; }).join(', ');
            var esc = prompt('ID da operadora (' + nomes + '):', '1');
            if (esc) opId = operators[parseInt(esc, 10) - 1]?.id || operators[0].id;
        }
        var titular = prompt('Nome do titular (deixe vazio se chip ficará na TI):', '');
        var custody = titular ? 'WITH_PERSON' : 'WITH_TI';
        var payload = {
            line_number: line.trim(),
            operator: opId,
            custody: custody,
            employee_name: titular || '',
        };
        if (custody === 'WITH_TI' && envelopes.length) {
            payload.batch = envelopes[0].id;
        }
        fetch('{% url "chips:grid_create" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
            body: JSON.stringify(payload),
        })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(res) {
            if (!res.ok) {
                var msg = res.data.error || JSON.stringify(res.data.errors || res.data);
                alert(msg);
                return;
            }
            table.replaceData();
        });
    });

    document.getElementById('callcenter-grid').addEventListener('click', function(e) {
        var btn = e.target.closest('button');
        if (!btn) return;
        var id = btn.getAttribute('data-id');
        if (btn.classList.contains('btn-transfer')) {
            htmx.ajax('GET', '/chips/api/grid/' + id + '/transfer/modal/', '#modal-container');
        }
        if (btn.classList.contains('btn-return')) {
            if (!envelopes.length) { alert('Cadastre um envelope aberto.'); return; }
            var opts = envelopes.map(function(e, i) { return (i+1) + ': ' + e.label; }).join('\n');
            var esc = prompt('Envelope na TI:\n' + opts, '1');
            if (!esc) return;
            var env = envelopes[parseInt(esc, 10) - 1];
            if (!env) return;
            var fd = new FormData();
            fd.append('envelope', env.id);
            fd.append('csrfmiddlewaretoken', csrfToken);
            fetch('/chips/api/grid/' + id + '/return/', {
                method: 'POST',
                headers: { 'X-CSRFToken': csrfToken },
                body: fd,
            })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.error) alert(d.error);
                else table.replaceData();
            });
        }
        if (btn.classList.contains('btn-recharge')) {
            htmx.ajax('GET', '{% url "chips:recharge_create" %}?chip_id=' + id, '#modal-container');
        }
    });

    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.successful && evt.detail.elt && evt.detail.elt.id === 'modal-container') {
            var xhr = evt.detail.xhr;
            if (xhr && xhr.status === 204) table.replaceData();
        }
    });
})();
</script>
